<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExtForge — Chrome Extension Generator</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

  <div class="app" id="app">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="header-text">
        <h1>ExtForge — Chrome Extension Generator</h1>
        <p>text → production-ready extension · manifest v3</p>
      </div>
      <span class="model-badge">claude-sonnet-4</span>
    </header>

    <!-- PROMPT SECTION -->
    <section class="prompt-section">
      <label class="prompt-label" for="prompt-input">describe your extension</label>
      <div class="prompt-row">
        <textarea
          class="prompt-input"
          id="prompt-input"
          placeholder="e.g. A tab manager that groups tabs by domain with color labels and a search bar..."
        ></textarea>
        <button class="generate-btn" id="generate-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Generate
        </button>
      </div>
      <div class="chips" id="chips"></div>
    </section>

    <!-- STATUS BAR -->
    <div class="status-bar">
      <div class="status-dot idle" id="status-dot"></div>
      <span class="status-text" id="status-text">Ready — describe your extension idea above</span>
    </div>

    <!-- EXTENSION INFO BAR -->
    <div id="ext-info-bar" class="ext-info" style="display:none">
      <span class="ext-badge" id="ext-name-badge"></span>
      <span class="ext-desc" id="ext-desc-badge"></span>
    </div>

    <!-- WORKSPACE: FILE TREE + CODE VIEWER -->
    <div class="workspace">

      <!-- FILE TREE -->
      <aside class="file-tree">
        <div class="file-tree-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
          files
        </div>
        <div class="file-list" id="file-list">
          <div class="file-tree-empty" id="tree-empty">
            No files yet.<br/>Generate an extension<br/>to see files here.
          </div>
        </div>
        <div class="file-tree-footer" id="file-tree-footer" style="display:none">
          <button class="download-all-btn" id="download-all-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download all (.zip)
          </button>
        </div>
      </aside>

      <!-- CODE VIEWER -->
      <main class="code-viewer">
        <div class="code-viewer-header" id="code-header" style="display:none">
          <span class="code-viewer-title" id="code-title">—</span>
          <button class="download-file-btn" id="download-file-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
        </div>
        <div class="code-content" id="code-content">
          <div class="empty-viewer" id="empty-viewer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
            <span>Select a file to view its contents</span>
          </div>
        </div>
      </main>

    </div>
  </div>

  <!-- NOTIFICATION TOAST -->
  <div class="notif" id="notif">
    <div class="notif-dot"></div>
    <span id="notif-text"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
